            <span class="floating-word" style="left:74%; top:100%; font-size:1.1rem; animation-duration:23s; animation-delay:12s;">CodeBook</span>
            <span class="floating-word" style="left:81%; top:100%; font-size:0.9rem; animation-duration:18s; animation-delay:6s;">Python</span>

            <span class="floating-word" style="left:6%; top:100%; font-size:1rem; animation-duration:20s; animation-delay:10s;">C++</span>
            <span class="floating-word" style="left:46%; top:100%; font-size:0.85rem; animation-duration:25s; animation-delay:13s;">CodeBook</span>

        </div>
    <div class="modal fade" id="reportModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-flag-fill report-icon me-2" style="color:#7c3aed"></i>
                        Report Content
                    </h5>
                   <button class="btn-purple ms-auto" onclick="goBack()">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
                </div>
                <form id="reportForm">
                <div class="modal-body">
                    <p class="text-secondary">Please provide a reason for reporting this content. Our team will review your report and take appropriate action.</p>
                    <div class="list-group">
                        <label class="list-group-item">
                            <input class="form-check-input me-1" type="radio" name="reportReason" value="Inappropriate Content" required>
                            Inappropriate Content
                        </label>
                        <label class="list-group-item">
                            <input class="form-check-input me-1" type="radio" name="reportReason" value="Spam or Misleading" required>
                            Spam or Misleading
                        </label>    
                        <label class="list-group-item">
                            <input class="form-check-input me-1" type="radio" name="reportReason" value="Harassment or Bullying" required>
                            Harassment or Bullying
                        </label> 
                        <label class="list-group-item">
                            <input class="form-check-input me-1" type="radio" name="reportReason" value="Violence" required>   
                            Violence or Harmful Behavior
                        </label>
                        <label class="list-group-item">
                            <input class="form-check-input me-1" type="radio" name="reportReason" value="Other" required>
                            Other (Please specify below)
                        </label>
                    </div>
                        <div class="mt-4">
                            <label class="form-label fw-semibold">
                                Additional Details (Optional)
                                     </label>
             
                            <textarea class="form-control" id="reportDescription" rows="4" maxlength="500" placeholder="Please provide any additional details about your report..."></textarea>
                            <div class="text-end small text-muted mt-1">
                                <span id="charCount">0</span>/500 characters
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                            <div id="errorMsg" class="error-msg"></div>

                            <div id="successMsg" class="success-msg"></div>
                          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" id="cancel-report-btn">Cancel</button>
                        <button class="btn report-btn" id="submitReportBtn">
                            <i class="bi bi-flag-fill me-1"></i>
                            Submit Report</button>
                    </div>
                </form>
        
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
