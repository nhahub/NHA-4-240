<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - CodeBook</title>
         <link rel="icon" type="image/png" href="../Images/logo.png?v=1">
   <link rel="shortcut icon" type="image/png" href="../Images/logo.png?v=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/style.css">
</head>
<body>

    <nav class="navbar d-flex justify-content-between align-items-center px-4 py-3">
            <a href="Feed.html" class="navbar-brand">
           <span style="color:#7c3aed;">&lt;</span><span class="logo-code">Code</span><span style="color:#7c3aed;">Book</span><span style="color:#7c3aed;">/&gt;</span>
         </a> 
           <div class="nav-actions ms-auto">
                     <label class="theme-switch">
               <input type="checkbox" id="themeToggle">
                <span class ="switch-track">
             <i class="fa-solid fa-sun"></i>
             <i class="fa-solid fa-moon"></i>
             <span class ="switch-thumb"></span>
                </span>
            </label>
                <a href="Feed.html" class="btn-purple">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </a>
            </div>
       
    </nav>
       
    <div class="container">
        <h2 style=" margin-bottom:20px">
            <i class="fa-solid fa-pen-to-square"></i> Edit Post
        </h2>

        <div class="post-card">
            
            <div class="mb-3">
                <label>Title</label>
                <input type="text" id="title" class="form-control" 
                       placeholder="Enter post title">
            </div>

            <div class="mb-3">
                <label>Body</label>
                <textarea id="body" class="form-control" rows="4" 
                          placeholder="What's on your mind?"></textarea>
            </div>

            <div class="mb-3">
                <label>Code Snippet (optional)</label>
                <textarea id="codeSnippet" class="form-control" rows="6" 
                          placeholder="Paste your code here..."
                          style="font-family:monospace"></textarea>
            </div>

            <div class="mb-3">
                <label>Language</label>
                <select id="language" class="form-control">
                    <option value="">Select language</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Python">Python</option>
                    <option value="C#">C#</option>
                    <option value="C++">C++</option>
                    <option value="Java">Java</option>
                    <option value="TypeScript">TypeScript</option>
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="SQL">SQL</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="mb-3 d-flex align-items-center gap-3">
                <label>Public Post</label>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="isPublic" checked>
                </div>
            </div>

            <div id="errorMsg" class="error-msg"></div>

            <div id="successMsg" class="success-msg"></div>

            <div class="d-flex gap-2 mt-3">
                <button class="btn-purple" onclick="updatePost()">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
                <button class="btn-purple" onclick="deletePost()" 
                        style="border-color:#f85149; color:#f85149">
                    <i class="fa-solid fa-trash"></i> Delete Post
                </button>
            </div>
        </div>
    </div>
    <script src="../../JS/theme.js"></script>
    <script src="../../JS/Posts/EditPost.js" type="module"></script>
</body>
</html>
