    <link rel="stylesheet" href="../../CSS/style.css">
</head>
<body>

               <input type="checkbox" id="themeToggle">

             <i class="fa-solid fa-sun"></i>
             <i class="fa-solid fa-moon"></i>
             <span class ="switch-thumb"></span>

            </label>
                <a href="Feed.html" class="btn-purple">
                    <i class="fa-solid fa-arrow-left"></i> Back to Feed
                </a>
            </div>
        </div>
    </nav>
   <div class="bg-decor">
        <div class="floating-words" aria-hidden="true">
            <span class="floating-word" style="left:2%; top:100%; font-size:1.1rem; animation-duration:18s; animation-delay:0s;">CodeBook</span>
            <span class="floating-word" style="left:10%; top:100%; font-size:0.8rem; animation-duration:21s; animation-delay:5s;">Java</span>

            <span class="floating-word" style="left:26%; top:100%; font-size:0.9rem; animation-duration:24s; animation-delay:9s;">C#</span>
            <span class="floating-word" style="left:34%; top:100%; font-size:1rem; animation-duration:19s; animation-delay:4s;">CodeBook</span>
            <span class="floating-word" style="left:42%; top:100%; font-size:1.4rem; animation-duration:15s; animation-delay:11s;">HTML</span>
            <span class="floating-word" style="left:50%; top:100%; font-size:0.85rem; animation-duration:26s; animation-delay:1s;">CodeBook</span>
            <span class="floating-word" style="left:58%; top:100%; font-size:1.2rem; animation-duration:17s; animation-delay:7s;">CodeBook</span>
            <span class="floating-word" style="left:66%; top:100%; font-size:0.95rem; animation-duration:20s; animation-delay:3s;">JavaScript</span>
            <span class="floating-word" style="left:74%; top:100%; font-size:1.1rem; animation-duration:23s; animation-delay:12s;">CodeBook</span>
            <span class="floating-word" style="left:81%; top:100%; font-size:0.9rem; animation-duration:18s; animation-delay:6s;">Python</span>
            <span class="floating-word" style="left:88%; top:100%; font-size:1.3rem; animation-duration:22s; animation-delay:8s;">CodeBook</span>
            <span class="floating-word" style="left:6%; top:100%; font-size:1rem; animation-duration:20s; animation-delay:10s;">C++</span>
            <span class="floating-word" style="left:46%; top:100%; font-size:0.85rem; animation-duration:25s; animation-delay:13s;">CodeBook</span>
            <span class="floating-word" style="left:62%; top:100%; font-size:1.15rem; animation-duration:16s; animation-delay:14s;">CSS</span>
            <span class="floating-word" style="left:94%; top:100%; font-size:0.9rem; animation-duration:19s; animation-delay:15s;">CodeBook</span>
        </div>
    <div id="errorMsg" class="error-msg"></div>

    <div id="successMsg" class="success-msg"></div>
    <div class="container">
        <h2 style=" margin-bottom:20px">
            <i class="fa-solid fa-search"></i> Search CodeBook
        </h2>

        <div class="post-card mb-4">
            
            <div class="mb-3">
                <input type="text" id="searchInput" class="form-control" 
                       placeholder="Search for posts, users, or communities...">
            </div>

            <div class="d-flex gap-2 mb-3">
                <button class="btn-purple active-filter" 
                        id="tab-posts" onclick="switchTab('posts')">
                    <i class="fa-solid fa-file-code"></i> Posts
                </button>
                <button class="btn-purple" 
                        id="tab-users" onclick="switchTab('users')">
                    <i class="fa-solid fa-user"></i> Users
                </button>
                <button class="btn-purple" 
                        id="tab-communities" onclick="switchTab('communities')">
                    <i class="fa-solid fa-people-group"></i> Communities
                </button>
            </div>

            <div id="postFilters" class="row g-3">
                <div class="col-md-5">
                    <select id="languageFilter" class="form-control">
                        <option value="">All Languages</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="Python">Python</option>
                        <option value="C#">C#</option>
                        <option value="C++">C++</option>
                        <option value="Java">Java</option>
                        <option value="TypeScript">TypeScript</option>
                        <option value="HTML">HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="SQL">SQL</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-5">
                    <input type="text" id="tagFilter" class="form-control" 
                           placeholder="Filter by tag...">
                </div>
                <div class="col-md-2">
                    <button class="btn-purple w-100" onclick="search()">
                        <i class="fa-solid fa-search"></i> Search
                    </button>
                </div>
            </div>

            <div id="otherFilters" style="display:none">
                <button class="btn-purple w-100" onclick="search()">
                    <i class="fa-solid fa-search"></i> Search
                </button>
            </div>
        </div>

        <div id="resultsCount" style="color:#bca1ec; margin-bottom:15px; display:none">
        </div>

        <div id="resultsContainer">
            <p style="color:#8b949e">Search for posts, users or communities above...</p>
        </div>
    </div>
    <script src="../../JS/theme.js"></script>
    <script src="../../JS/Posts/Search.js" type="module"></script>
</body>
</html>
